<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubHub Dashboard</title>
    <meta name="description" content="" />
    <!-- styles -->
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/dashboard.css" />
    <link rel="stylesheet" href="/css/graphs.css" />

    <!-- icons -->
    <link href='https://cdn.boxicons.com/fonts/basic/boxicons.min.css' rel='stylesheet'>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">SUBHUB</span>
                <button class="close-sidebar-btn bx bx-x"></button>
            </div>
            <div class="nav-links">
                <div class="nav-link active"><a href="#">Dashboard</a></div>
                <div class="nav-link"><a href="#">Shared</a></div>
                <div class="nav-link"><a href="#">Bills</a></div>
            </div>
        </aside>

        <main>
            <header class="main-header">
                <button class="hamburger-menu bx bx-menu"></button>
                <h1><a id="user-info"> </a> </h1>
                <div class="buttons">
                    <button href="#" class="button-primary" id="addSubscription"> <i class='bxr bx-plus-circle'></i>Add
                        Subscription</button>
                        <button class="logout-btn button-secondary" id="logout-btn">LOGOUT</button>
                    </div>
                </header>
                
                <h2 id="dashboard-title">Dashboard</h2>
            <div class="dashboard-content">
                <div class="overview-card">
                    <h2 class="neutral-tittle">Overview</h2>
                    <div class="overview-down">
                        <div class="overview-subscriptions">
                            <h3>Next Payments</h3>
                            <div class="card" id="subscription-list"></div>
                        </div>
                        <div class="overview-graph">
                            <h3>Monthly Spending</h3>
                            <p class="spending-value text1"></p>
                            <div class="bar-chart">
                                <div class="bar bar-1"></div>
                                <div class="bar bar-2"></div>
                                <div class="bar bar-3"></div>
                                <div class="bar bar-4"></div>
                                <div class="bar bar-5"></div>
                                <div class="bar bar-6"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="coming-up-card">
                    <h2>Subscriptions</h2>
                    <div class="overview-chart">
                        <div class="pie-chart-container">
                            <svg class="pie-chart-svg" viewBox="0 0 100 100">
                            </svg>
                            <div class="pie-center-text">
                                Total<br>0.00€
                            </div>
                            <div class="pie-tooltip">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="subscriptions-container">
                <h2> All Subscriptions </h2>
                <div class="subscriptions-list">
                    <div class="subscriptions-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>Subscription</th>
                                    <th>Renovation date</th>
                                    <th>Price</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="subscriptionsTableBody">
                                <!-- Subscriptions will be dynamically inserted here -->
                                <tr>
                                    <td>Netflix</td>
                                    <td>2023-10-15</td>
                                    <td>12.99€</td>
                                    <td>Active</td>
                                    <td> 
                                        <a class="actionButtons" onclick="openModal()"><i class='bxr  bx-pencil-square'></i></a>
                                        <a class="actionButtons" onclick="openModal()"><i class='bxr  bx-trash-x'></i></a>
                                    </td>
                                </tr>
                                <tr>
                                    <td>Spotify</td>
                                    <td>2023-10-20</td>
                                    <td>9.99€</td>
                                    <td>Active</td>
                                    <td>
                                        <button class="edit-btn">Edit</button>
                                        <button class="delete-btn">Delete</button>
                                    </td>
                                </tr>
                                <tr>
                                    <td>Amazon Prime</td>
                                    <td>2023-11-01</td>
                                    <td>5.99€</td>
                                    <td>Active</td>
                                    <td>
                                        <button class="edit-btn">Edit</button>
                                        <button class="delete-btn">Delete</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                </main>
            </div>
            
            <script src="/js/WebComponents.js" defer></script>
    <script src="/js/pie_chart.js" defer></script>
    <script src="/js/bar_chart.js" defer></script>
    <script src="/js/toggle_menu.js" defer></script>
    <script src="/js/next_payments.js" defer></script>
     <script type="module" src="/js/user_authentication.js" defer></script>
     <script src="/js/dashboard.js" defer></script>


</body>

</html>
